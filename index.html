<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ff6b6b">
<title>あーすわいず都道府県チャンピオン</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="あーすわいず都道府県チャンピオン">
<meta property="og:title" content="あーすわいず都道府県チャンピオン">
<meta property="og:description" content="小学生・中学生・高校生以上の3レベルで挑戦！日本の都道府県クイズ（全1000問・オンラインランキングつき）">
<meta property="og:image" content="/icons/icon-512.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<style>
  :root{
    --bg1:#fff3d6; --bg2:#ffe0e6;
    --pink:#ff6b6b; --pink-d:#ee5253;
    --blue:#54a0ff; --blue-d:#2e86de;
    --green:#26de81; --green-d:#20bf6b;
    --yellow:#feca57; --yellow-d:#ff9f1a;
    --purple:#a55eea; --purple-d:#8854d0;
    --ink:#3a3153; --card:#ffffff;
    --ok:#26de81; --ng:#ff6b6b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic UI","Segoe UI",system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    min-height:100dvh;
    display:flex;justify-content:center;align-items:flex-start;
    padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
    overflow-x:hidden;
  }
  #app{width:100%;max-width:520px;padding:16px 4px 40px;}
  .screen{animation:pop .35s cubic-bezier(.2,1.3,.4,1);}
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.97);}to{opacity:1;transform:none;}}
  .hidden{display:none!important;}

  /* Title */
  .title-wrap{text-align:center;margin:18px 0 8px;}
  .brand{display:inline-block;font-size:clamp(20px,6.5vw,30px);font-weight:900;color:#fff;
    letter-spacing:.06em;margin-bottom:8px;padding:6px 18px;border-radius:999px;
    background:linear-gradient(135deg,var(--green),var(--green-d));
    box-shadow:0 4px 12px rgba(38,222,129,.35);}
  .title{
    font-size:clamp(30px,9vw,44px);font-weight:900;line-height:1.15;letter-spacing:.02em;
    background:linear-gradient(90deg,var(--pink),var(--yellow-d),var(--blue));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 0 rgba(0,0,0,.05);
  }
  .sub{margin-top:8px;font-size:15px;font-weight:700;color:#7a6f95;}
  .map-emoji{font-size:56px;display:block;margin:10px 0 2px;animation:bob 2.4s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-8px) rotate(3deg);}}

  .section-h{font-size:15px;font-weight:800;color:#7a6f95;margin:26px 6px 12px;text-align:center;}

  /* Level cards */
  .levels{display:flex;flex-direction:column;gap:14px;}
  .level-btn{
    border:none;cursor:pointer;text-align:left;
    border-radius:22px;padding:18px 18px;color:#fff;
    display:flex;align-items:center;gap:16px;
    box-shadow:0 6px 0 rgba(0,0,0,.12),0 10px 20px rgba(0,0,0,.12);
    transition:transform .08s, box-shadow .08s;
    font-family:inherit;
  }
  .level-btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.12),0 6px 12px rgba(0,0,0,.12);}
  .level-btn .emoji{font-size:40px;line-height:1;filter:drop-shadow(0 2px 2px rgba(0,0,0,.15));}
  .level-btn .txt{flex:1;}
  .level-btn .lname{display:block;font-size:22px;font-weight:900;}
  .level-btn .ldesc{display:block;font-size:13px;font-weight:700;opacity:.95;margin-top:3px;}
  .level-btn .badge{
    background:rgba(255,255,255,.28);border-radius:999px;padding:6px 12px;
    font-size:13px;font-weight:900;white-space:nowrap;
  }
  .lv-el{background:linear-gradient(135deg,var(--green),var(--green-d));}
  .lv-jr{background:linear-gradient(135deg,var(--blue),var(--blue-d));}
  .lv-sr{background:linear-gradient(135deg,var(--purple),var(--purple-d));}
  .lv-cap{background:linear-gradient(135deg,#20bf9b,#0fb9b1);box-shadow:0 6px 0 rgba(0,0,0,.12),0 10px 20px rgba(0,0,0,.12);}

  /* Japan map (県庁所在地モード) */
  .mapwrap{background:#f2f8f3;border-radius:20px;padding:10px;margin-bottom:14px;box-shadow:inset 0 1px 4px rgba(0,0,0,.06);}
  .mapwrap svg{display:block;width:100%;height:auto;max-height:300px;}
  .map-cap{text-align:center;font-size:13px;font-weight:900;color:#0e8a76;margin-top:4px;}

  .best-line{text-align:center;font-size:12px;font-weight:800;color:#9a8fb5;margin-top:22px;}

  /* Quiz */
  .qtop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:6px 2px 4px;}
  .chip{font-size:13px;font-weight:900;padding:6px 12px;border-radius:999px;background:#fff;color:var(--ink);box-shadow:0 2px 6px rgba(0,0,0,.08);}
  .chip.lv{color:#fff;}
  .score-chip{background:var(--yellow);color:#7a5b00;}
  .progress{height:12px;background:#ffffff;border-radius:999px;overflow:hidden;margin:8px 2px 16px;box-shadow:inset 0 1px 3px rgba(0,0,0,.12);}
  .bar{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--pink),var(--yellow-d));transition:width .4s cubic-bezier(.2,1,.4,1);}

  .qcard{
    background:var(--card);border-radius:24px;padding:22px 18px;
    box-shadow:0 8px 22px rgba(0,0,0,.10);margin-bottom:18px;
  }
  .qnum{font-size:13px;font-weight:900;color:var(--pink);}
  .qtext{font-size:20px;font-weight:900;line-height:1.5;margin-top:8px;}

  .choices{display:flex;flex-direction:column;gap:12px;}
  .choice{
    border:3px solid #eee7f5;background:#fff;border-radius:18px;
    padding:16px 16px;font-size:17px;font-weight:800;color:var(--ink);
    cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;
    box-shadow:0 4px 0 #e7e0f0;transition:transform .08s,box-shadow .08s,border-color .1s,background .1s;
    font-family:inherit;
  }
  .choice:active{transform:translateY(3px);box-shadow:0 1px 0 #e7e0f0;}
  .choice .mark{
    width:30px;height:30px;border-radius:50%;flex:0 0 30px;
    background:#f0ebf8;color:#8a7fae;font-weight:900;
    display:flex;align-items:center;justify-content:center;font-size:16px;
  }
  .choice.correct{background:#e9fbf1;border-color:var(--ok);box-shadow:0 4px 0 #b7f0d0;}
  .choice.correct .mark{background:var(--ok);color:#fff;}
  .choice.wrong{background:#ffecec;border-color:var(--ng);box-shadow:0 4px 0 #ffc9c9;}
  .choice.wrong .mark{background:var(--ng);color:#fff;}
  .choice.dim{opacity:.55;}
  .choice[disabled]{cursor:default;}

  .feedback{text-align:center;font-weight:900;font-size:20px;min-height:28px;margin:2px 0 10px;}
  .feedback.ok{color:var(--green-d);}
  .feedback.ng{color:var(--pink-d);}

  .next-btn,.big-btn{
    display:block;width:100%;border:none;cursor:pointer;font-family:inherit;
    border-radius:18px;padding:16px;font-size:18px;font-weight:900;color:#fff;
    background:linear-gradient(135deg,var(--pink),var(--pink-d));
    box-shadow:0 5px 0 var(--pink-d);transition:transform .08s,box-shadow .08s;
  }
  .next-btn:active,.big-btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--pink-d);}
  .big-btn.blue{background:linear-gradient(135deg,var(--blue),var(--blue-d));box-shadow:0 5px 0 var(--blue-d);}

  /* Result */
  .result-card{background:var(--card);border-radius:26px;padding:26px 20px;text-align:center;box-shadow:0 10px 26px rgba(0,0,0,.12);}
  .rank-emoji{font-size:74px;line-height:1;animation:bob 2.4s ease-in-out infinite;}
  .rank-title{font-size:26px;font-weight:900;margin:8px 0 2px;}
  .score-big{font-size:52px;font-weight:900;background:linear-gradient(90deg,var(--pink),var(--yellow-d));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .score-sub{font-size:15px;font-weight:800;color:#8a7fae;margin-top:2px;}
  .stat-row{display:flex;gap:10px;margin:18px 0;}
  .stat{flex:1;background:#f7f3fc;border-radius:16px;padding:12px 4px;}
  .stat .n{font-size:24px;font-weight:900;}
  .stat .l{font-size:12px;font-weight:800;color:#8a7fae;}
  .newbest{display:inline-block;background:var(--yellow);color:#7a5b00;font-weight:900;font-size:13px;padding:6px 14px;border-radius:999px;margin-top:6px;}
  .btn-row{display:flex;flex-direction:column;gap:12px;margin-top:20px;}

  /* Leaderboard */
  .lb{margin-top:20px;text-align:left;border-top:2px dashed #eee2f3;padding-top:16px;}
  .lb-title{font-size:15px;font-weight:900;text-align:center;color:#7a6f95;margin-bottom:12px;}
  .name-entry{display:flex;gap:8px;margin-bottom:12px;}
  .name-entry input{flex:1;border:3px solid #eee7f5;border-radius:14px;padding:12px;font-size:18px;font-weight:800;font-family:inherit;text-align:center;letter-spacing:.35em;}
  .name-entry input:focus{outline:none;border-color:var(--pink);}
  .name-entry button{border:none;background:linear-gradient(135deg,var(--yellow),var(--yellow-d));color:#7a5b00;font-weight:900;font-family:inherit;border-radius:14px;padding:0 18px;font-size:15px;cursor:pointer;box-shadow:0 4px 0 var(--yellow-d);white-space:nowrap;}
  .name-entry button:active{transform:translateY(3px);box-shadow:0 1px 0 var(--yellow-d);}
  .name-entry button:disabled{opacity:.5;box-shadow:none;}
  ol.board{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
  ol.board li{display:flex;align-items:center;gap:10px;background:#f7f3fc;border-radius:14px;padding:10px 14px;font-weight:800;}
  ol.board li .rk{width:26px;height:26px;flex:0 0 26px;border-radius:50%;background:#e7e0f0;color:#8a7fae;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;}
  ol.board li.top1 .rk{background:#ffd54a;color:#7a5b00;}
  ol.board li.top2 .rk{background:#d7dde6;color:#5a6472;}
  ol.board li.top3 .rk{background:#e6b98a;color:#6b4a2a;}
  ol.board li .nm{flex:1;letter-spacing:.15em;}
  ol.board li .sc{color:var(--pink-d);font-weight:900;}
  ol.board li.me{background:#fff5d6;border:2px solid var(--yellow-d);}
  .you-line{text-align:center;font-weight:900;margin-top:12px;color:var(--ink);}
  .lb-msg{text-align:center;font-size:12px;font-weight:700;color:#9a8fb5;margin-top:10px;}
  .footer{text-align:center;font-size:11px;color:#b3a9c9;margin-top:26px;font-weight:700;}
  .install-hint{margin-top:18px;text-align:center;}
  #installBtn{border:none;background:#fff;color:var(--ink);font-weight:900;font-family:inherit;
    border-radius:14px;padding:10px 18px;font-size:14px;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.1);}
</style>
</head>
<body>
<div id="app">

  <!-- START -->
  <section id="start" class="screen">
    <div class="title-wrap">
      <span class="map-emoji">🗾</span>
      <div class="brand">🌏 あーすわいず</div>
      <div class="title">都道府県<br>チャンピオン</div>
      <div class="sub">名物・県庁所在地・国土・地政学<br>三択クイズで日本まるわかり！</div>
    </div>

    <div class="section-h">レベルをえらんでね</div>
    <div class="levels" id="levels"></div>

    <div class="section-h">とくべつモード</div>
    <div class="levels">
      <button class="level-btn lv-cap" id="capBtn">
        <span class="emoji">🗾</span>
        <span class="txt"><span class="lname">県庁所在地モード</span>
        <span class="ldesc">日本地図で場所を見ながら県庁所在地を当てよう</span></span>
        <span class="badge">1問15点</span>
      </button>
    </div>

    <div class="best-line" id="bestLine"></div>

    <div class="install-hint">
      <button id="installBtn" class="hidden">📲 ホーム画面に追加</button>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="screen hidden">
    <div class="qtop">
      <span class="chip lv" id="lvChip">🌱 小学生</span>
      <span class="chip" id="qCount">1 / 10</span>
      <span class="chip score-chip" id="scoreChip">0 点</span>
    </div>
    <div class="progress"><div class="bar" id="bar"></div></div>

    <div class="mapwrap hidden" id="mapWrap">
      <div id="mapSvg"></div>
      <div class="map-cap" id="mapCap">📍 ここはどこ？</div>
    </div>

    <div class="qcard">
      <div class="qnum" id="qNum">第1問（10点）</div>
      <div class="qtext" id="qText"></div>
    </div>

    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn hidden" id="nextBtn">つぎの問題 →</button>
  </section>

  <!-- RESULT -->
  <section id="result" class="screen hidden">
    <div class="result-card">
      <div class="rank-emoji" id="rankEmoji">🏆</div>
      <div class="rank-title" id="rankTitle"></div>
      <div class="score-big" id="finalScore">0</div>
      <div class="score-sub" id="finalScoreSub"></div>
      <div id="bestWrap"></div>
      <div class="stat-row">
        <div class="stat"><div class="n" id="stCorrect">0</div><div class="l">正解</div></div>
        <div class="stat"><div class="n" id="stTotal">10</div><div class="l">問題数</div></div>
        <div class="stat"><div class="n" id="stRate">0%</div><div class="l">正答率</div></div>
      </div>
      <div class="lb">
        <div class="lb-title" id="lbTitle">🏆 オンラインランキング</div>
        <div class="name-entry" id="nameEntry">
          <input id="nameInput" maxlength="5" placeholder="なまえを5文字" autocomplete="off">
          <button id="submitScore">登録</button>
        </div>
        <ol class="board" id="board"></ol>
        <div class="you-line" id="youLine"></div>
        <div class="lb-msg" id="lbMsg"></div>
      </div>

      <div class="btn-row">
        <button class="big-btn" id="retryBtn">もう一度チャレンジ 🔁</button>
        <button class="big-btn blue" id="homeBtn">レベルをえらぶ 🏠</button>
      </div>
    </div>
    <div class="footer">都道府県チャンピオン</div>
  </section>

</div>

<script src="prefectures.js"></script>
<script src="geopolitics.js"></script>
<script src="generator.js"></script>
<script src="japanmap.js"></script>
<script>
(function(){
  "use strict";
  const N = 10; // 出題数
  const $ = id => document.getElementById(id);
  const store = {
    get(k,d){ try{ const v=localStorage.getItem(k); return v===null?d:JSON.parse(v);}catch(e){return d;} },
    set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
  };

  const LV_CLASS = {elementary:"lv-el", junior:"lv-jr", senior:"lv-sr"};
  const LV_DESC = {
    elementary:"名物・有名スポット中心のやさしい問題",
    junior:"県庁所在地・産業・国土にチャレンジ",
    senior:"地政学・EEZ・海峡まで本格派"
  };

  let state = null;

  function shuffle(a){
    const arr = a.slice();
    for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
  }

  // ---- Start screen ----
  function renderStart(){
    const box = $("levels"); box.innerHTML="";
    Object.keys(QUIZ_DATA).forEach(key=>{
      const d = QUIZ_DATA[key];
      const btn = document.createElement("button");
      btn.className = "level-btn "+LV_CLASS[key];
      btn.innerHTML =
        `<span class="emoji">${d.emoji}</span>
         <span class="txt"><span class="lname">${d.label}</span>
         <span class="ldesc">${LV_DESC[key]}</span></span>
         <span class="badge">1問${d.points}点</span>`;
      btn.addEventListener("click",()=>startQuiz(key));
      box.appendChild(btn);
    });
    // best scores
    const parts = Object.keys(QUIZ_DATA).map(k=>{
      const b = store.get("best_"+k,0);
      return `${QUIZ_DATA[k].emoji}${QUIZ_DATA[k].label} ${b}点`;
    });
    parts.push(`🗾県庁所在地 ${store.get("best_capital",0)}点`);
    $("bestLine").textContent = "🏅 ベスト: " + parts.join("　/　");
  }

  // ---- Quiz ----
  function startQuiz(key){
    const d = QUIZ_DATA[key];
    const picked = shuffle(d.questions).slice(0, Math.min(N, d.questions.length));
    const qs = picked.map(item=>{
      const correctText = item.choices[item.answer];
      const opts = shuffle(item.choices);
      return { q:item.q, opts, correct:opts.indexOf(correctText), correctText };
    });
    state = { key, d, qs, idx:0, score:0, correct:0 };
    show("quiz");
    $("lvChip").textContent = `${d.emoji} ${d.label}`;
    $("lvChip").className = "chip lv "+LV_CLASS[key];
    $("lvChip").style.color="#fff";
    // set chip bg via class colors
    renderQuestion();
  }

  // ---- 県庁所在地モード ----
  function pickTwo(correct, all, prefer){
    const p = shuffle([...new Set((prefer||[]).filter(c=>c && c!==correct))]);
    const rest = shuffle([...new Set(all.filter(c=>c && c!==correct && !p.includes(c)))]);
    const out=[]; for(const c of p){ if(out.length>=2)break; out.push(c);} for(const c of rest){ if(out.length>=2)break; out.push(c);}
    return out;
  }
  function startCapitalMode(){
    const d = { label:"県庁所在地", points:15, emoji:"🗾" };
    const pool = (window.PREFS||[]).filter(p=>p.name!=="東京都");
    const allCaps = pool.map(p=>p.cap);
    const picked = shuffle(pool).slice(0, Math.min(N, pool.length));
    const qs = picked.map(p=>{
      const sameRegion = pool.filter(x=>x.region===p.region && x.name!==p.name).map(x=>x.cap);
      const distr = pickTwo(p.cap, allCaps, sameRegion);
      const opts = shuffle([p.cap, distr[0], distr[1]]);
      return { q:`「${p.name}」の県庁所在地は？`, opts, correct:opts.indexOf(p.cap), correctText:p.cap, pref:p.name };
    });
    state = { key:"capital", d, qs, idx:0, score:0, correct:0, map:true };
    show("quiz");
    $("lvChip").textContent = `${d.emoji} ${d.label}`;
    $("lvChip").className = "chip lv lv-cap"; $("lvChip").style.color = "#fff";
    renderQuestion();
  }

  function renderQuestion(){
    const s = state, item = s.qs[s.idx];
    // 県庁所在地モード：日本地図で場所を表示
    if(s.map && item.pref && window.buildJapanSVG){
      $("mapWrap").classList.remove("hidden");
      $("mapSvg").innerHTML = buildJapanSVG(item.pref);
      $("mapCap").textContent = `📍「${item.pref}」はこの場所です`;
    } else {
      $("mapWrap").classList.add("hidden");
    }
    $("qCount").textContent = `${s.idx+1} / ${s.qs.length}`;
    $("scoreChip").textContent = `${s.score} 点`;
    $("bar").style.width = ((s.idx)/s.qs.length*100)+"%";
    $("qNum").textContent = `第${s.idx+1}問（${s.d.points}点）`;
    $("qText").textContent = item.q;
    $("feedback").textContent=""; $("feedback").className="feedback";
    $("nextBtn").classList.add("hidden");
    $("nextBtn").textContent = (s.idx===s.qs.length-1) ? "結果を見る 🎉" : "つぎの問題 →";

    const box = $("choices"); box.innerHTML="";
    const letters=["A","B","C","D"];
    item.opts.forEach((opt,i)=>{
      const b=document.createElement("button");
      b.className="choice";
      b.innerHTML=`<span class="mark">${letters[i]}</span><span>${opt}</span>`;
      b.addEventListener("click",()=>answer(i,b));
      box.appendChild(b);
    });
  }

  function answer(i, btn){
    const s=state, item=s.qs[s.idx];
    const buttons=[...document.querySelectorAll("#choices .choice")];
    buttons.forEach((b,bi)=>{
      b.disabled=true;
      if(bi===item.correct) b.classList.add("correct");
      else if(bi===i) b.classList.add("wrong");
      else b.classList.add("dim");
    });
    const fb=$("feedback");
    if(i===item.correct){
      s.score+=s.d.points; s.correct++;
      fb.textContent="⭕️ せいかい！ +"+s.d.points+"点";
      fb.className="feedback ok";
    }else{
      fb.textContent="❌ ざんねん… 正解は「"+item.correctText+"」";
      fb.className="feedback ng";
    }
    $("scoreChip").textContent = `${s.score} 点`;
    $("bar").style.width = ((s.idx+1)/s.qs.length*100)+"%";
    $("nextBtn").classList.remove("hidden");
  }

  function next(){
    const s=state;
    if(s.idx < s.qs.length-1){ s.idx++; renderQuestion(); window.scrollTo({top:0,behavior:"smooth"}); }
    else showResult();
  }

  // ---- Result ----
  function showResult(){
    const s=state;
    const max = s.d.points * s.qs.length;
    const rate = Math.round(s.correct/s.qs.length*100);
    const bestKey="best_"+s.key;
    const prevBest=store.get(bestKey,0);
    const isBest = s.score>prevBest;
    if(isBest) store.set(bestKey, s.score);

    let emoji,title;
    if(rate===100){emoji="👑";title="パーフェクト！ 都道府県マスター";}
    else if(rate>=80){emoji="🏆";title="すごい！ チャンピオン級";}
    else if(rate>=60){emoji="🥈";title="いいね！ もう少しで達人";}
    else if(rate>=40){emoji="🥉";title="その調子！ 練習あるのみ";}
    else {emoji="🌱";title="スタート地点！ ここから伸びる";}

    $("rankEmoji").textContent=emoji;
    $("rankTitle").textContent=title;
    $("finalScore").textContent=s.score;
    $("finalScoreSub").textContent=`／ ${max}点（${s.d.emoji}${s.d.label}・1問${s.d.points}点）`;
    $("stCorrect").textContent=s.correct;
    $("stTotal").textContent=s.qs.length;
    $("stRate").textContent=rate+"%";
    $("bestWrap").innerHTML = isBest
      ? `<div class="newbest">🎉 自己ベスト更新！</div>`
      : `<div class="newbest" style="background:#eee;color:#888">ベスト ${prevBest}点</div>`;

    // ランキング初期化
    $("lbTitle").textContent = `🏆 オンラインランキング（${s.d.emoji}${s.d.label}）`;
    $("nameEntry").classList.remove("hidden");
    $("youLine").textContent = "";
    $("nameInput").value = store.get(nameKey, "") || "";
    submitting = false; $("submitScore").disabled = false;
    loadBoard(s.key);

    show("result");
    window.scrollTo({top:0,behavior:"smooth"});
    // 満点なら紙吹雪でお祝い
    if(rate===100) setTimeout(()=>confetti({count:150}), 350);
  }

  // ---- Leaderboard (online) ----
  const API = "/api/scores";
  const nameKey = "playerName";
  let submitting = false;

  function escapeHtml(x){ return String(x).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  // ---- 紙吹雪（Canvas・ライブラリ不要） ----
  function confetti(opts){
    opts = opts || {};
    const count = opts.count || 130;
    const power = opts.power || 1;
    const cvs = document.createElement("canvas");
    cvs.style.cssText = "position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:9999";
    document.body.appendChild(cvs);
    const ctx = cvs.getContext("2d");
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const W = window.innerWidth, H = window.innerHeight;
    cvs.width = W * dpr; cvs.height = H * dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
    const colors = ["#ff6b6b","#feca57","#54a0ff","#26de81","#a55eea","#ff9ff3","#ffffff"];
    const origins = opts.origins || [{x:W*0.5, y:H*0.30}];
    const parts = [];
    for(let i=0;i<count;i++){
      const o = origins[i % origins.length];
      const ang = -Math.PI/2 + (Math.random()-0.5)*Math.PI*0.95;
      const sp = (6 + Math.random()*7) * power;
      parts.push({
        x:o.x, y:o.y,
        vx:Math.cos(ang)*sp*(0.6+Math.random()*0.8),
        vy:Math.sin(ang)*sp - Math.random()*3,
        g:0.18+Math.random()*0.1,
        size:6+Math.random()*7,
        color:colors[(Math.random()*colors.length)|0],
        rot:Math.random()*Math.PI, vrot:(Math.random()-0.5)*0.32,
        life:0, ttl:100+Math.random()*50,
        rect:Math.random()<0.5
      });
    }
    function tick(){
      ctx.clearRect(0,0,W,H);
      let alive=0;
      for(const p of parts){
        if(p.life>p.ttl) continue;
        p.life++; alive++;
        p.vy+=p.g; p.vx*=0.99; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vrot;
        const a=Math.max(0,1-p.life/p.ttl);
        ctx.save(); ctx.globalAlpha=a; ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.color;
        if(p.rect) ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
        else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,7); ctx.fill(); }
        ctx.restore();
      }
      if(alive>0) requestAnimationFrame(tick); else cvs.remove();
    }
    requestAnimationFrame(tick);
  }
  function confettiCannons(){
    const W=window.innerWidth, H=window.innerHeight;
    confetti({count:180, power:1.25, origins:[{x:W*0.12,y:H*0.9},{x:W*0.88,y:H*0.9}]});
  }

  async function fetchBoard(level){
    const r = await fetch(`${API}?level=${encodeURIComponent(level)}`, {cache:"no-store"});
    if(!r.ok) throw new Error("fetch"); return r.json();
  }
  async function postScore(level,name,score){
    const r = await fetch(API,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({level,name,score})});
    if(!r.ok) throw new Error("post"); return r.json();
  }
  function renderBoard(top, meName, meScore){
    const ol=$("board"); ol.innerHTML="";
    if(!top || !top.length){
      ol.innerHTML = `<li><span class="nm" style="color:#9a8fb5;font-weight:700">まだ記録がありません。1位をねらおう！</span></li>`;
      return;
    }
    const cls=["top1","top2","top3"];
    top.forEach((e,i)=>{
      const li=document.createElement("li");
      const isMe = meName!=null && e.name===meName && e.score===meScore;
      li.className = (i<3?cls[i]:"") + (isMe?" me":"");
      li.innerHTML = `<span class="rk">${i+1}</span><span class="nm">${escapeHtml(e.name)}</span><span class="sc">${e.score}点</span>`;
      ol.appendChild(li);
    });
  }
  async function loadBoard(level){
    $("lbMsg").textContent = "読み込み中…";
    try{
      const data = await fetchBoard(level);
      renderBoard(data.top);
      $("lbMsg").textContent = "";
    }catch(e){
      $("board").innerHTML = "";
      $("lbMsg").textContent = "ランキングに接続できませんでした（オフライン、または未公開）。";
    }
  }
  async function submitHandler(){
    if(submitting || !state) return;
    const name = ($("nameInput").value||"").trim();
    if(!name){ $("lbMsg").textContent="なまえを入力してね（1〜5文字）"; $("nameInput").focus(); return; }
    submitting = true; $("submitScore").disabled = true; $("lbMsg").textContent = "登録中…";
    try{
      store.set(nameKey, name);
      const data = await postScore(state.key, name, state.score);
      const myName = (data.you && data.you.name) || name;
      renderBoard(data.top, myName, state.score);
      $("nameEntry").classList.add("hidden");
      if(data.rank){
        $("youLine").textContent = (data.rank===1 ? "🎉 " : "") + `あなたは ${data.total}人中 ${data.rank}位！`;
        if(data.rank===1) confettiCannons();          // 1位は盛大にお祝い
        else if(data.rank<=3) confetti({count:120});   // 2〜3位も紙吹雪
      }
      else { $("youLine").textContent = `惜しい！ トップ${data.top.length}入りならず（${myName} ${state.score}点）`; }
      $("lbMsg").textContent = "";
    }catch(e){
      $("lbMsg").textContent = "登録に失敗しました。通信環境をご確認ください。";
    }finally{
      submitting = false; $("submitScore").disabled = false;
    }
  }

  function show(id){
    ["start","quiz","result"].forEach(x=>$(x).classList.add("hidden"));
    const el=$(id); el.classList.remove("hidden");
    // re-trigger animation
    el.classList.remove("screen"); void el.offsetWidth; el.classList.add("screen");
  }

  // ---- events ----
  $("nextBtn").addEventListener("click",next);
  $("retryBtn").addEventListener("click",()=> state && state.key==="capital" ? startCapitalMode() : startQuiz(state.key));
  $("homeBtn").addEventListener("click",()=>{ renderStart(); show("start"); });
  $("capBtn").addEventListener("click", startCapitalMode);
  $("submitScore").addEventListener("click", submitHandler);
  $("nameInput").addEventListener("keydown", e=>{ if(e.key==="Enter") submitHandler(); });

  // ---- PWA install ----
  let deferredPrompt=null;
  window.addEventListener("beforeinstallprompt",e=>{
    e.preventDefault(); deferredPrompt=e;
    const b=$("installBtn"); b.classList.remove("hidden");
    b.onclick=async()=>{ b.classList.add("hidden"); deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; };
  });

  if("serviceWorker" in navigator){
    window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
  }

  renderStart();
})();
</script>
</body>
</html>
